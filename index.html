<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOCHA Mobile Order</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .item {
      margin-bottom: 20px;
    }

    .item img {
      width: 100%;
      border-radius: 12px;
    }

    .item h3 {
      margin: 10px 0 5px;
    }

    .price {
      color: #aaa;
      margin-bottom: 10px;
    }

    button {
      background: #ff0055;
      border: none;
      padding: 12px;
      border-radius: 10px;
      color: white;
      width: 100%;
      font-size: 16px;
    }

    .category {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 10px;
    }

    .category button {
      min-width: 80px;
      background: #222;
    }
  </style>
</head>

<body>

  <header>MOCHA ORDER</header>

  <div class="category">
    <button>Beer</button>
    <button>Whiskey</button>
    <button>Food</button>
  </div>

  <div class="container">

    <div class="card">

      <div class="item">
        <img src="https://images.unsplash.com/photo-1604908176997-431e7a3c0f1f" />
        <h3>Coke Beer</h3>
        <div class="price">¥700</div>
        <button onclick="order('Coke Beer')">Order</button>
      </div>

      <div class="item">
        <img src="https://images.unsplash.com/photo-1582450871972-ab5ca641643d" />
        <h3>Shandy Gaff</h3>
        <div class="price">¥700</div>
        <button onclick="order('Shandy Gaff')">Order</button>
      </div>

    </div>

  </div>

  <script>
    function order(item) {
      alert(item + " を注文しました！");
    }
  </script>

</body>
</html>
