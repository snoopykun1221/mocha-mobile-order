<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOCA Mobile Order</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111111;
    }

    header {
      position: sticky;
      top: 0;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      z-index: 100;
      padding: 16px 12px 10px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 1px;
    }

    header p {
      margin: 6px 0 0;
      color: #666;
      font-size: 14px;
    }

    .top-buttons {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid #eee;
      background: #fff;
      position: sticky;
      top: 79px;
      z-index: 99;
    }

    .top-buttons button {
      flex: 1;
      padding: 12px;
      border: 1px solid #111;
      background: #111;
      color: #fff;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .category-bar {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 12px;
      border-bottom: 1px solid #eee;
      background: #fff;
      position: sticky;
      top: 141px;
      z-index: 98;
    }

    .category-bar button {
      white-space: nowrap;
      border: 1px solid #ccc;
      background: #fff;
      color: #111;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
    }

    .category-bar button.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .container {
      padding: 14px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .card {
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 12px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      border-radius: 12px;
      background: #f3f3f3;
    }

    .card h3 {
      font-size: 18px;
      margin: 12px 0 6px;
      line-height: 1.3;
    }

    .desc {
      font-size: 12px;
      color: #666;
      min-height: 34px;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .price {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .card button {
      width: 100%;
      padding: 10px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .empty-food {
      padding: 30px 20px;
      text-align: center;
      color: #666;
      border: 1px dashed #ccc;
      border-radius: 14px;
      background: #fafafa;
    }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .modal {
      width: 100%;
      max-width: 420px;
      max-height: 85vh;
      overflow-y: auto;
      background: #fff;
      color: #111;
      border-radius: 18px;
      padding: 18px;
    }

    .modal h2 {
      margin-top: 0;
      font-size: 22px;
    }

    .modal p {
      color: #555;
      line-height: 1.5;
    }

    .option-group {
      margin: 16px 0;
    }

    .option-group label {
      display: block;
      margin: 8px 0;
      font-size: 15px;
    }

    .qty-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px 0;
    }

    .qty-row button {
      width: 38px;
      height: 38px;
      border: 1px solid #ccc;
      background: #fff;
      color: #111;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    .qty-number {
      min-width: 30px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .modal-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }

    .btn-main {
      background: #111;
      color: #fff;
    }

    .btn-sub {
      background: #eee;
      color: #111;
    }

    .cart-item, .history-item {
      border-bottom: 1px solid #eee;
      padding: 10px 0;
    }

    .cart-item:last-child, .history-item:last-child {
      border-bottom: none;
    }

    .small-text {
      color: #666;
      font-size: 13px;
      margin-top: 4px;
    }

    .total-box {
      margin: 16px 0;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>MOCA ORDER</h1>
    <p>モバイルオーダー</p>
  </header>

  <div class="top-buttons">
    <button onclick="openCart()">カート</button>
    <button onclick="openHistory()">注文履歴</button>
  </div>

  <div class="category-bar" id="categoryBar"></div>

  <div class="container">
    <div id="menuArea"></div>
  </div>

  <div class="modal-bg" id="itemModalBg">
    <div class="modal">
      <h2 id="modalTitle"></h2>
      <p id="modalDesc"></p>
      <div class="price" id="modalPrice"></div>

      <div class="option-group" id="drinkOptions">
        <strong>割り方を選択</strong>
        <label><input type="radio" name="mix" value="ロック" checked> ロック</label>
        <label><input type="radio" name="mix" value="ソーダ"> ソーダ</label>
        <label><input type="radio" name="mix" value="水割り"> 水割り</label>
      </div>

      <div class="qty-row">
        <button onclick="changeQty(-1)">−</button>
        <div class="qty-number" id="qtyNumber">1</div>
        <button onclick="changeQty(1)">＋</button>
      </div>

      <div class="modal-actions">
        <button class="btn-sub" onclick="closeItemModal()">閉じる</button>
        <button class="btn-main" onclick="addToCart()">カートに追加</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="cartModalBg">
    <div class="modal">
      <h2>カート</h2>
      <div id="cartItems"></div>
      <div class="total-box" id="cartTotal">合計：¥0</div>
      <div class="modal-actions">
        <button class="btn-sub" onclick="closeCart()">閉じる</button>
        <button class="btn-main" onclick="placeOrder()">この内容で注文</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="historyModalBg">
    <div class="modal">
      <h2>注文履歴</h2>
      <div id="historyItems"></div>
      <div class="modal-actions">
        <button class="btn-main" onclick="closeHistory()">閉じる</button>
      </div>
    </div>
  </div>

      {

      {

        name: "100%ジュース / お茶 / コーラ",
        price: 600,
        desc: "各￥600",

      },
      {
        category: "NON ALCOHOL & SOFT DRINK",
        name: "フロート",
        price: 700,
        desc: "コーラ、コーヒー",
        image: "https://images.unsplash.com/photo-1572490122747-3968b75cc699"
      },
      {
        category: "NON ALCOHOL & SOFT DRINK",
        name: "ノンアルコールビール",
        price: 700,
        desc: "キリン零ICHI",
        image: "https://images.unsplash.com/photo-1563379091339-03246963d29c"
      }
    ];

    let currentCategory = "BEER";
    let selectedItem = null;
    let quantity = 1;
    let cart = JSON.parse(localStorage.getItem("mocaCart")) || [];
    let history = JSON.parse(localStorage.getItem("mocaHistory")) || [];

    function renderCategories() {
      const bar = document.getElementById("categoryBar");
      bar.innerHTML = "";

      categories.forEach(category => {
        const btn = document.createElement("button");
        btn.textContent = category;
        if (category === currentCategory) {
          btn.classList.add("active");
        }
        btn.onclick = () => {
          currentCategory = category;
          renderCategories();
          renderMenu();
        };
        bar.appendChild(btn);
      });
    }

    function renderMenu() {
      const menuArea = document.getElementById("menuArea");

      if (currentCategory === "FOOD") {
        menuArea.innerHTML = `
          <div class="empty-food">
            FOODは準備中です
          </div>
        `;
        return;
      }

      const filtered = items.filter(item => item.category === currentCategory);

      let html = `<div class="menu-grid">`;
      filtered.forEach((item, index) => {
        html += `
          <div class="card" onclick="openItemModal(${items.indexOf(item)})">
            <img src="${item.image}" alt="${item.name}">
            <h3>${item.name}</h3>
            <div class="desc">${item.desc}</div>
            <div class="price">¥${item.price.toLocaleString()}</div>
            <button type="button">選択する</button>
          </div>
        `;
      });
      html += `</div>`;

      menuArea.innerHTML = html;
    }

    function openItemModal(index) {
      selectedItem = items[index];
      quantity = 1;
      document.getElementById("qtyNumber").textContent = quantity;
      document.getElementById("modalTitle").textContent = selectedItem.name;
      document.getElementById("modalDesc").textContent = selectedItem.desc;
      document.getElementById("modalPrice").textContent = "¥" + selectedItem.price.toLocaleString();

      const isDrink = selectedItem.category !== "FOOD";
      document.getElementById("drinkOptions").style.display = isDrink ? "block" : "none";

      const firstOption = document.querySelector('input[name="mix"][value="ロック"]');
      if (firstOption) firstOption.checked = true;

      document.getElementById("itemModalBg").style.display = "flex";
    }

    function closeItemModal() {
      document.getElementById("itemModalBg").style.display = "none";
    }

    function changeQty(num) {
      quantity += num;
      if (quantity < 1) quantity = 1;
      document.getElementById("qtyNumber").textContent = quantity;
    }

    function addToCart() {
      const mix = document.querySelector('input[name="mix"]:checked')?.value || "";
      cart.push({
        name: selectedItem.name,
        price: selectedItem.price,
        desc: selectedItem.desc,
        mix: mix,
        quantity: quantity,
        subtotal: selectedItem.price * quantity
      });

      localStorage.setItem("mocaCart", JSON.stringify(cart));
      closeItemModal();
      alert("カートに追加しました");
    }

    function openCart() {
      const cartItems = document.getElementById("cartItems");

      if (cart.length === 0) {
        cartItems.innerHTML = `<p>カートは空です</p>`;
        document.getElementById("cartTotal").textContent = "合計：¥0";
      } else {
        let html = "";
        let total = 0;

        cart.forEach((item, index) => {
          total += item.subtotal;
          html += `
            <div class="cart-item">
              <strong>${item.name}</strong>
              <div class="small-text">割り方：${item.mix || "なし"}</div>
              <div class="small-text">数量：${item.quantity}</div>
              <div class="small-text">小計：¥${item.subtotal.toLocaleString()}</div>
            </div>
          `;
        });

        cartItems.innerHTML = html;
        document.getElementById("cartTotal").textContent = "合計：¥" + total.toLocaleString();
      }

      document.getElementById("cartModalBg").style.display = "flex";
    }

    function closeCart() {
      document.getElementById("cartModalBg").style.display = "none";
    }

    function placeOrder() {
      if (cart.length === 0) {
        alert("カートが空です");
        return;
      }

      const orderedAt = new Date().toLocaleString("ja-JP");
      history.unshift({
        orderedAt: orderedAt,
        items: [...cart]
      });

      localStorage.setItem("mocaHistory", JSON.stringify(history));
      cart = [];
      localStorage.setItem("mocaCart", JSON.stringify(cart));

      closeCart();
      alert("注文が完了しました");
    }

    function openHistory() {
      const historyItems = document.getElementById("historyItems");

      if (history.length === 0) {
        historyItems.innerHTML = `<p>注文履歴はありません</p>`;
      } else {
        let html = "";
        history.forEach(order => {
          html += `
            <div class="history-item">
              <strong>${order.orderedAt}</strong>
          `;

          order.items.forEach(item => {
            html += `
              <div class="small-text">
                ${item.name} / ${item.mix || "なし"} / ${item.quantity}杯 / ¥${item.subtotal.toLocaleString()}
              </div>
            `;
          });

          html += `</div>`;
        });

        historyItems.innerHTML = html;
      }

      document.getElementById("historyModalBg").style.display = "flex";
    }

    function closeHistory() {
      document.getElementById("historyModalBg").style.display = "none";
    }

    renderCategories();
    renderMenu();
  </script>
</body>
</html>
